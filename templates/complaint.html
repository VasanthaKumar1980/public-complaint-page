<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Complaint</title>
<link rel="stylesheet" href="{{ url_for('static', filename ='css/complaint.css')}}">
</head>

<body>

<div class="container">

    <!-- Left Section -->
    <div class="left">
        <h1>Submit Complaint</h1>
        <p>
            Report issues like road damage, garbage problems, water issues, 
            and help improve your city.
        </p>
    </div>

    <!-- Right Section -->
    <div class="right">
        <h2>Complaint Form</h2>

        <form id="complaintForm" method="POST">

            <input type="text" name="complaint_name" placeholder="Your Name" required>

            <input type="email" name="complaint_email" placeholder="Your Email" required>

            <select name="complaint_category" required>
                <option value="">Select Category</option>
                <option>Road Damage</option>
                <option>Garbage Issue</option>
                <option>Street Light</option>
                <option>Water Problem</option>
            </select>

            <textarea name="complaint_description" placeholder="Describe your complaint..." required></textarea>

            <button type="submit">Submit Complaint</button>

        </form>
    </div>

</div>
<br><br>
<br><br>
<div style="text-align: center;" id="pending">
<a href="{{ url_for('pendings') }}">View Pending Complaints</a>
</div>
</body>
</html>
